<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapSpot - 冒险打卡游戏</title>
    <link rel="stylesheet" href="/assets/index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
      body { overflow-x: hidden; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      input, textarea, button { font-family: inherit; }
      .leaflet-container { touch-action: pan-x pan-y; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/assets/index.js"></script>
</body>
</html>
