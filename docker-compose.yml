version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tapspot-backend
    restart: always
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: TapSpot@2026
      DB_NAME: tapspot
      PORT: 8080
      GIN_MODE: release
      AI_API_KEY: ${AI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    network_mode: "host"

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tapspot-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - tapspot-network

volumes:
  mysql_data:

networks:
  tapspot-network:
    driver: bridge
